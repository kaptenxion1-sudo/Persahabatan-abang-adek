<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Space | Navigation Fixed</title>
    <style>
        :root { --pink: #ff758c; --blue: #0093e9; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--dark); color: white; overflow: hidden; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .bg-glow { position: fixed; width: 100vw; height: 100vh; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(0, 147, 233, 0.2), transparent 40%), radial-gradient(circle at 100% 100%, rgba(255, 117, 140, 0.2), transparent 40%); }
        .viewport { width: 95%; max-width: 500px; height: 90vh; position: relative; overflow: hidden; border-radius: 25px; border: 1px solid var(--border); background: var(--glass); backdrop-filter: blur(20px); display: flex; flex-direction: column; }
        
        /* Navigasi */
        .nav-menu { display: none; justify-content: space-around; padding: 15px 10px; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.3); z-index: 100; }
        .nav-item { font-size: 0.7rem; font-weight: bold; color: #666; cursor: pointer; transition: 0.3s; padding: 8px 12px; border-radius: 10px; }
        .nav-item.active { color: white; background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(255,255,255,0.05); }

        .screen { position: absolute; top: 60px; bottom: 0; width: 100%; padding: 20px; transition: 0.4s ease; display: none; flex-direction: column; overflow-y: auto; }
        .screen.active { display: flex; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Login */
        #scr-login { top: 0; display: flex; justify-content: center; align-items: center; z-index: 200; background: var(--dark); }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; }
        button { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-pink { background: var(--pink); color: white; }

        /* Content */
        .card { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .chat-list { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column-reverse; gap: 10px; margin-bottom: 15px; padding: 10px; }
        .chat-bubble { padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; border-left: 4px solid transparent; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        #canvas-container { background: white; border-radius: 15px; width: 100%; height: 300px; position: relative; overflow: hidden; }
        #canvas { width: 100%; height: 100%; touch-action: none; cursor: crosshair; }
        .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 10px; }
        .gallery-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="viewport">
        
        <div id="main-nav" class="nav-menu">
            <div class="nav-item active" onclick="openTab('home', this)">HOME</div>
            <div class="nav-item" onclick="openTab('curhat', this)">CURHAT</div>
            <div class="nav-item" onclick="openTab('foto', this)">FOTO</div>
            <div class="nav-item" onclick="openTab('busana', this)">BUSANA</div>
        </div>

        <div id="scr-login" class="screen active">
            <div style="width: 80%; text-align: center;">
                <h1 style="letter-spacing: 5px; margin-bottom: 30px;">QUANTUM<br><span style="color:var(--pink)">V8.0</span></h1>
                <input type="text" id="user" placeholder="USERNAME">
                <input type="password" id="pass" placeholder="PASSWORD">
                <button class="btn-blue" style="width: 100%" onclick="toDashboard()">UNLOCK ACCESS</button>
            </div>
        </div>

        <div id="tab-home" class="screen">
            <div class="card" style="text-align: center; margin-top: 20px;">
                <h2 style="margin:0"><span style="color:var(--blue)">SYAHRUL</span> × <span style="color:var(--pink)">SABILA</span></h2>
                <p style="color: #888; font-size: 0.8rem;">Welcome back to your private space.</p>
            </div>
            <div class="card">
                <p style="font-size: 0.7rem; margin: 0; color: var(--blue); font-weight: bold;">STATUS SISTEM</p>
                <p style="font-size: 1.1rem; margin: 5px 0;">Online & Secured</p>
            </div>
            <button class="btn-pink" onclick="location.reload()" style="margin-top: auto; margin-bottom: 20px;">LOCK SYSTEM</button>
        </div>

        <div id="tab-curhat" class="screen">
            <div id="chat-list" class="chat-list"></div>
            <div class="card" style="margin-top: auto;">
                <textarea id="msg" placeholder="Ada cerita apa hari ini?" rows="2"></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-blue" style="flex:1" onclick="kirim('SYAHRUL')">SYAHRUL</button>
                    <button class="btn-pink" style="flex:1" onclick="kirim('SABILA')">SABILA</button>
                </div>
            </div>
        </div>

        <div id="tab-foto" class="screen">
            <div class="card">
                <p style="font-size: 0.7rem; color: var(--blue); margin-bottom: 10px; font-weight: bold;">UPLOAD MEMORIES</p>
                <input type="file" id="img-input" accept="image/*" onchange="upFoto()" style="font-size: 0.8rem;">
            </div>
            <div id="gallery" class="gallery-grid"></div>
        </div>

        <div id="tab-busana" class="screen">
            <p style="text-align: center; color: var(--pink); font-weight: bold; margin-bottom: 10px; font-size: 0.8rem;">SABILA'S FASHION STUDIO</p>
            <div id="canvas-container">
                <canvas id="canvas"></canvas>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <input type="color" id="color" style="width: 50px; height: 45px; border: none; background: none; cursor: pointer;">
                <button class="btn-pink" style="flex:1" onclick="clearCanvas()">RESET</button>
                <button class="btn-blue" style="flex:1" onclick="saveImg()">SAVE</button>
            </div>
            <p style="margin-top: 20px; font-size: 0.7rem; color: #888; font-weight: bold;">PORTFOLIO DESAIN</p>
            <div id="portfolio" class="gallery-grid" style="margin-top: 10px; padding-bottom: 20px;"></div>
        </div>

    </div>

    <script>
        function toDashboard() {
            const u = document.getElementById('user').value.toLowerCase();
            const p = document.getElementById('pass').value.toLowerCase();
            if((u === "sasah" || u === "sasha") && p === "sampai lulus") {
                document.getElementById('scr-login').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                openTab('home', document.querySelector('.nav-item'));
            } else { alert("ACCESS DENIED!"); }
        }

        function openTab(tabName, el) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById('tab-' + tabName).classList.add('active');
            if(el) el.classList.add('active');

            if(tabName === 'busana') {
                setTimeout(initCanvas, 100);
            }
        }

        function kirim(who) {
            const txt = document.getElementById('msg').value; if(!txt) return;
            const b = document.createElement('div'); b.className = 'chat-bubble';
            b.style.background = (who === 'SYAHRUL') ? 'rgba(0,147,233,0.1)' : 'rgba(255,117,140,0.1)';
            b.style.borderLeftColor = (who === 'SYAHRUL') ? 'var(--blue)' : 'var(--pink)';
            b.innerHTML = `<b style="font-size:0.7rem; color:${(who === 'SYAHRUL') ? 'var(--blue)' : 'var(--pink)'}">${who}</b><br>${txt}`;
            document.getElementById('chat-list').prepend(b);
            document.getElementById('msg').value = '';
        }

        function upFoto() {
            const file = document.getElementById('img-input').files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.createElement('img'); img.src = e.target.result;
                document.getElementById('gallery').prepend(img);
            }; reader.readAsDataURL(file);
        }

        // Canvas Fixed Logic
        let cvs, ctx, drawing = false;
        function initCanvas() {
            cvs = document.getElementById('canvas'); 
            ctx = cvs.getContext('2d');
            const container = document.getElementById('canvas-container');
            
            // Set ukuran canvas sesuai kontainer real-time
            cvs.width = container.clientWidth;
            cvs.height = container.clientHeight;
            
            ctx.lineCap = 'round'; 
            ctx.lineWidth = 3;

            const getPos = (e) => {
                const rect = cvs.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => { 
                drawing = true; 
                const p = getPos(e); 
                ctx.beginPath(); 
                ctx.moveTo(p.x, p.y); 
            };
            
            const draw = (e) => { 
                if(!drawing) return; 
                if(e.touches) e.preventDefault();
                ctx.strokeStyle = document.getElementById('color').value;
                const p = getPos(e); 
                ctx.lineTo(p.x, p.y); 
                ctx.stroke(); 
            };
            
            const stop = () => { drawing = false; };

            cvs.onmousedown = start; cvs.onmousemove = draw; window.onmouseup = stop;
            cvs.ontouchstart = start; cvs.ontouchmove = draw; cvs.ontouchend = stop;
        }

        function clearCanvas() { ctx.clearRect(0,0,cvs.width,cvs.height); }
        function saveImg() {
            const img = document.createElement('img'); 
            img.src = cvs.toDataURL();
            document.getElementById('portfolio').prepend(img);
            clearCanvas();
            alert("Desain disimpan ke Portfolio!");
        }
    </script>
</body>
</html>
